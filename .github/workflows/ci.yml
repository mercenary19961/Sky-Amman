name: CI

# Runs the guardrails on every PR (and on pushes to main) so a regression
# can't be merged silently: TypeScript type-check, the production build
# (client + SSR), and the PHPUnit suite.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm run test:js

      - name: Build (client + SSR)
        run: npm run build

  backend:
    name: Backend — PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          # pdo_sqlite + sqlite3 back the in-memory test DB (see phpunit.xml).
          extensions: ctype, curl, dom, fileinfo, filter, hash, mbstring, openssl, pcre, pdo, pdo_sqlite, sqlite3, session, tokenizer, xml
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare app key
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test
