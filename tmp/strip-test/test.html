<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; background: #ffffff; font-family: system-ui, sans-serif; }
  .row {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; padding: 24px;
    font-size: 28px; color: #1f2937;
  }
  .strip {
    height: 64px;
    width: 224px;
    display: block;
  }
  .label { font-size: 14px; color: #6b7280; padding: 0 24px; }
</style>
</head>
<body>
  <div class="label" id="lbl"></div>
  <script>
    fetch('strip.svg').then(r => r.text()).then(t => {
      const m = t.match(/d="([^"]+)"/);
      document.getElementById('lbl').textContent = 'path: ' + (m ? m[1] : '');
    });
  </script>
  <div class="row">
    <span>Save More</span>
    <img class="strip" src="strip.svg" alt="" />
    <span>Gain More</span>
  </div>
</body>
</html>
